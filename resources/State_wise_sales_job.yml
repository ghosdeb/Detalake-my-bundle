resources:
  jobs:
    State_wise_sales:
      name: State_wise_sales
      tasks:
        - task_key: customers_raw
          sql_task:
            file:
              path: ../src/bronze_ingestion/customers_raw.sql
              source: WORKSPACE
            warehouse_id: fa8d001ea621773d
        - task_key: customers_bronze_ingestion
          depends_on:
            - task_key: customers_raw
          sql_task:
            file:
              path: ../src/bronze_ingestion/customers_bronze_ingestion.sql
              source: WORKSPACE
            warehouse_id: fa8d001ea621773d
        - task_key: customers_silver_cleaned
          depends_on:
            - task_key: customers_bronze_ingestion
          notebook_task:
            notebook_path: ../src/silver_cleaning/customers_silver_cleaned.ipynb
            base_parameters:
              bronze_schema: ${var.bronze_schema}
              silver_schema: ${var.silver_schema}
            source: WORKSPACE
          environment_key: Default
        - task_key: customers_silver_enriched
          depends_on:
            - task_key: customers_silver_cleaned
          notebook_task:
            notebook_path: ../src/silver_cleaning/customers_silver_enriched.ipynb
            base_parameters:
              silver_schema: ${var.silver_schema}
            source: WORKSPACE
          environment_key: Default
        - task_key: orders_bronze_ingestion
          notebook_task:
            notebook_path: ../src/bronze_ingestion/orders_bronze_ingestion.ipynb
            base_parameters:
              bronze_schema: ${var.bronze_schema}
            source: WORKSPACE
          environment_key: Default
        - task_key: orders_silver_cleaned
          depends_on:
            - task_key: orders_bronze_ingestion
          notebook_task:
            notebook_path: ../src/silver_cleaning/orders_silver_cleaned.ipynb
            base_parameters:
              bronze_schema: ${var.bronze_schema}
              silver_schema: ${var.silver_schema}
            source: WORKSPACE
          environment_key: Default
        - task_key: If_duplicates_exists
          depends_on:
            - task_key: orders_silver_cleaned
          condition_task:
            op: EQUAL_TO
            left: "{{tasks.orders_silver_cleaned.values.has_duplicates}}"
            right: "true"
        - task_key: orders_dedupe
          depends_on:
            - task_key: If_duplicates_exists
              outcome: "true"
          notebook_task:
            notebook_path: ../src/silver_cleaning/orders_silver_dedupe.ipynb
            base_parameters:
              silver_schema: ${var.silver_schema}
            source: WORKSPACE
          environment_key: Default
        - task_key: orders_no_duplicates
          depends_on:
            - task_key: If_duplicates_exists
              outcome: "false"
          notebook_task:
            notebook_path: ../src/silver_cleaning/orders_silver_no_duplicates.ipynb
            base_parameters:
              silver_schema: ${var.silver_schema}
            source: WORKSPACE
          environment_key: Default
        - task_key: orders_branch_complete
          depends_on:
            - task_key: orders_dedupe
            - task_key: orders_no_duplicates
          run_if: ALL_DONE
          notebook_task:
            notebook_path: ../src/silver_cleaning/orders_branch_complete.ipynb
            source: WORKSPACE
        - task_key: city_wise_sales_gold
          depends_on:
            - task_key: customers_silver_enriched
            - task_key: orders_branch_complete
          notebook_task:
            notebook_path: ../src/gold_aggregation/city_wise_sales_gold.ipynb
            base_parameters:
              silver_schema: ${var.silver_schema}
              gold_schema: ${var.gold_schema}
            source: WORKSPACE
          environment_key: Default
        - task_key: state_wise_sales_gold
          depends_on:
            - task_key: city_wise_sales_gold
          for_each_task:
            inputs: '["Maharashtra", "Gujarat", "Uttar Pradesh"]'
            task:
              task_key: state_wise_sales_gold_iteration
              notebook_task:
                notebook_path: ../src/gold_aggregation/state_wise_sales_gold.ipynb
                base_parameters:
                  state: "{{input}}"
                  gold_schema: ${var.gold_schema}
                source: WORKSPACE
              environment_key: Default
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            environment_version: "5"
      performance_target: PERFORMANCE_OPTIMIZED