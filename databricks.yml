# This is a Databricks asset bundle definition for my_bundle.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: my_bundle
  uuid: f480e6e0-1eed-45b2-8854-f9767e969efc

variables:
  catalog:
  bronze_schema:
  silver_schema:
  gold_schema:

include:
  - resources/*.yml

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    presets: 
     name_prefix: dev_${workspace.current_user.short_name}_
     tags:
      env: dev
    mode: development
    #default: true
    #preset: dev
    workspace:
      host: https://dbc-c930de53-9999.cloud.databricks.com
    variables:
      catalog: deltalake_dab_demo
      bronze_schema: dev_bronze
      silver_schema: dev_silver
      gold_schema: dev_gold
  prod:
    mode: production
    #preset: prod
    workspace:
      host: https://dbc-c930de53-9999.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/debs.nc24@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/debs.nc24@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: deltalake_dab_demo
      bronze_schema: prod_bronze
      silver_schema: prod_silver
      gold_schema: prod_gold
    permissions:
      - user_name: debs.nc24@gmail.com
        level: CAN_MANAGE
